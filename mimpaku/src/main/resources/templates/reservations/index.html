<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
<th:block th:replace="~{fragment :: meta}"></th:block>
<th:block th:replace="~{fragment :: styles}"></th:block>

<title>予約一覧</title>
</head>

<body>
	<div class="mimpaku-wrapper">

		<!-- ヘッダー -->
		<div th:replace="~{fragment :: header}"></div>

		<main>
			<div class="container pb-5 mimpaku-container">

				<div class="row justify-content-center">
					<div class="col-xxl-9 col-xl-10 col-lg-11">

						<!-- パンくず -->
						<nav class="my-3" style="--bs-breadcrumb-divider: '>';"
							aria-label="breadcrumb">

							<ol class="breadcrumb mb-0">
								<li class="breadcrumb-item"><a th:href="@{/}">ホーム</a></li>

								<li class="breadcrumb-item active" aria-current="page">
									予約一覧</li>
							</ol>
						</nav>

						<!-- タイトル -->
						<h1 class="mb-4 text-center">予約一覧</h1>

						<!-- 完了メッセージ -->
						<div th:if="${param.reserved}" class="alert alert-success">
							予約が完了しました。</div>

						<!-- 予約テーブル -->
						<div class="table-responsive">

							<table class="table table-hover align-middle">

								<thead class="table-light">
									<tr>
										<th scope="col">民宿名</th>
										<th scope="col">チェックイン</th>
										<th scope="col">チェックアウト</th>
										<th scope="col">人数</th>
										<th scope="col">料金</th>
									</tr>
								</thead>

								<tbody>

									<tr th:if="${reservationPage.isEmpty()}">
										<td colspan="5" class="text-center text-muted py-4">
											予約はまだありません。</td>
									</tr>

									<tr th:each="reservation : ${reservationPage.getContent()}">

										<td><a
											th:href="@{/houses/{id}(id=${reservation.getHouse().getId()})}"
											th:text="${reservation.getHouse().getName()}"
											class="text-decoration-none"> </a></td>

										<td th:text="${reservation.getCheckinDate()}"></td>

										<td th:text="${reservation.getCheckoutDate()}"></td>

										<td th:text="${reservation.getNumberOfPeople() + '名'}"></td>

										<td
											th:text="${#numbers.formatInteger(reservation.getAmount(), 1, 'COMMA') + '円'}"></td>

									</tr>

								</tbody>

							</table>

						</div>

						<!-- ページネーション -->
						<div th:if="${reservationPage.getTotalPages() > 1}"
							class="d-flex justify-content-center mt-4">

							<nav aria-label="予約一覧ページ">

								<ul class="pagination">

									<!-- 前へ -->
									<li class="page-item"
										th:classappend="${reservationPage.isFirst()} ? 'disabled'">

										<a class="page-link mimpaku-page-link"
										th:unless="${reservationPage.isFirst()}"
										th:href="@{/reservations(page=${reservationPage.getNumber() - 1})}">
											前 </a> <span class="page-link"
										th:if="${reservationPage.isFirst()}"> 前 </span>

									</li>

									<!-- ページ番号 -->
									<li class="page-item"
										th:each="i : ${#numbers.sequence(0, reservationPage.getTotalPages() - 1)}"
										th:classappend="${i == reservationPage.getNumber()} ? 'active'">

										<span th:if="${i == reservationPage.getNumber()}"
										class="page-link mimpaku-active" th:text="${i + 1}"> </span> <a
										th:unless="${i == reservationPage.getNumber()}"
										th:href="@{/reservations(page=${i})}"
										class="page-link mimpaku-page-link" th:text="${i + 1}"> </a>

									</li>

									<!-- 次へ -->
									<li class="page-item"
										th:classappend="${reservationPage.isLast()} ? 'disabled'">

										<a class="page-link mimpaku-page-link"
										th:unless="${reservationPage.isLast()}"
										th:href="@{/reservations(page=${reservationPage.getNumber() + 1})}">
											次 </a> <span class="page-link"
										th:if="${reservationPage.isLast()}"> 次 </span>

									</li>

								</ul>

							</nav>

						</div>

					</div>
				</div>

			</div>
		</main>

		<!-- フッター -->
		<div th:replace="~{fragment :: footer}"></div>

	</div>

	<div th:replace="~{fragment :: scripts}"></div>

</body>
</html>
