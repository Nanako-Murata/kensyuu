<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>

<!-- =========================
         meta要素
    ========================== -->
<div th:fragment="meta" th:remove="tag">
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
</div>

<!-- =========================
         styles
    ========================== -->
<div th:fragment="styles" th:remove="tag">

	<!-- Bootstrap -->
	<link
		href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
		rel="stylesheet">

	<!-- Google Fonts -->
	<link rel="preconnect" href="https://fonts.googleapis.com">

	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

	<link
		href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&display=swap"
		rel="stylesheet">

	<!-- 自作CSS -->
	<link th:href="@{/css/style.css}" rel="stylesheet">

</div>

<title>fragment</title>

</head>

<body>

	<!-- =========================
     header
========================= -->

	<!-- ヘッダー -->
	<div th:fragment="header" th:remove="tag">

		<nav
			class="navbar navbar-expand-md navbar-light bg-white shadow-sm mimpaku-navbar">

			<div class="container mimpaku-container">

				<!-- ロゴ -->
				<a class="navbar-brand" th:href="@{/}"> <img
					class="mimpaku-logo me-1" th:src="@{/images/logo.png}"
					alt="Mimpaku">
				</a>

				<!-- ハンバーガーメニュー -->
				<button class="navbar-toggler" type="button"
					data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
					aria-controls="navbarSupportedContent" aria-expanded="false"
					aria-label="Toggle navigation">

					<span class="navbar-toggler-icon"></span>

				</button>

				<!-- メニュー -->
				<div class="collapse navbar-collapse" id="navbarSupportedContent">

					<ul class="navbar-nav ms-auto">

						<!-- 未ログイン -->
						<li class="nav-item" sec:authorize="isAnonymous()"><a
							class="nav-link" th:href="@{/login}"> ログイン </a></li>

						<li class="nav-item" sec:authorize="isAnonymous()"><a
							class="nav-link" th:href="@{/signup}"> 会員登録 </a></li>

						<!-- 一般ユーザー -->
						<li class="nav-item dropdown"
							sec:authorize="hasRole('ROLE_GENERAL')"><a
							id="navbarDropdownGeneral" class="nav-link dropdown-toggle"
							href="#" role="button" data-bs-toggle="dropdown"
							aria-haspopup="true" aria-expanded="false" v-pre> <span
								sec:authentication="principal.user.name"></span>

						</a>

							<div class="dropdown-menu dropdown-menu-end"
								aria-labelledby="navbarDropdownGeneral">

								<a class="dropdown-item mimpaku-dropdown-item"
									th:href="@{/user}"> 会員情報 </a> <a
									class="dropdown-item mimpaku-dropdown-item"
									th:href="@{/reservations}"> 予約一覧 </a>

								<div class="dropdown-divider"></div>

								<a class="dropdown-item mimpaku-dropdown-item"
									th:href="@{/logout}"
									onclick="event.preventDefault();
                                        document.getElementById('logout-form').submit();">

									ログアウト </a>

								<form class="d-none" id="logout-form" th:action="@{/logout}"
									method="post"></form>

							</div></li>

						<!-- 管理者 -->
						<li class="nav-item dropdown"
							sec:authorize="hasRole('ROLE_ADMIN')"><a
							id="navbarDropdownAdmin" class="nav-link dropdown-toggle"
							href="#" role="button" data-bs-toggle="dropdown"
							aria-haspopup="true" aria-expanded="false" v-pre> 管理者メニュー </a>

							<div class="dropdown-menu dropdown-menu-end"
								aria-labelledby="navbarDropdownAdmin">

								<a class="dropdown-item mimpaku-dropdown-item"
									th:href="@{/admin/users}"> 会員一覧 </a> <a
									class="dropdown-item mimpaku-dropdown-item"
									th:href="@{/admin/houses}"> 民宿一覧 </a>

								<div class="dropdown-divider"></div>

								<a class="dropdown-item mimpaku-dropdown-item"
									th:href="@{/logout}"
									onclick="event.preventDefault();
                                        document.getElementById('logout-form').submit();">

									ログアウト </a>

								<form class="d-none" id="logout-form" th:action="@{/logout}"
									method="post"></form>

							</div></li>

					</ul>

				</div>

			</div>

		</nav>

	</div>


	<!-- =========================
         footer
    ========================== -->
	<div th:fragment="footer" th:remove="tag">

		<footer class="text-center py-4">
			<small>© mimpaku</small>
		</footer>

	</div>

	<!-- =========================
         scripts
    ========================== -->
	<div th:fragment="scripts" th:remove="tag">

		<script
			src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js">
			
		</script>

	</div>

</body>
</html>
