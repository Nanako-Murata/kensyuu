<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head>

<!-- =========================
         meta要素の共通部品
         各ページで使い回す
    ========================== -->
<div th:fragment="meta" th:remove="tag">
	<!-- 文字コード -->
	<meta charset="UTF-8">

	<!-- レスポンシブ対応 -->
	<meta name="viewport" content="width=device-width, initial-scale=1">
</div>

<!-- =========================
         CSS・フォント読み込み部品
    ========================== -->
<div th:fragment="styles" th:remove="tag">

	<!-- Bootstrap CSS -->
	<link
		href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
		rel="stylesheet"
		integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
		crossorigin="anonymous">

	<!-- Google Fonts -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

	<link
		href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&display=swap"
		rel="stylesheet">

	<!-- 独自CSS -->
	<link th:href="@{/css/style.css}" rel="stylesheet">
</div>

<title>部品化用のHTMLファイル</title>

</head>

<body>

	<!-- =========================
         ヘッダー部品
    ========================== -->
	<div th:fragment="header" th:remove="tag">

		<!-- ナビゲーションバー -->
		<nav
			class="navbar navbar-expand-md navbar-light bg-white shadow-sm mimpaku-navbar">

			<div class="container mimpaku-container">

				<!-- ロゴ -->
				<a class="navbar-brand" th:href="@{/}"> <img
					class="mimpaku-logo me-1" th:src="@{/images/logo.png}"
					alt="mimpaku">

				</a>

			</div>

		</nav>

	</div>

	<!-- =========================
         フッター部品
    ========================== -->
	<div th:fragment="footer" th:remove="tag">

		<footer>

			<div class="d-flex justify-content-center align-items-center h-100">

				<!-- コピーライト -->
				<p class="text-center text-muted small mb-0">&copy; mimpaku All
					rights reserved.</p>

			</div>

		</footer>

	</div>

	<!-- =========================
         JavaScript読み込み部品
    ========================== -->
	<div th:fragment="scripts" th:remove="tag">

		<!-- Bootstrap JavaScript -->
		<script
			src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
			integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
			crossorigin="anonymous">
			
		</script>

	</div>

</body>
</html>
