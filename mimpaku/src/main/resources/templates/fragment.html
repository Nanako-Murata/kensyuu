<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>

<!-- =========================
     meta要素
========================== -->
<div th:fragment="meta" th:remove="tag">
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
</div>

<!-- =========================
     styles
========================== -->
<div th:fragment="styles" th:remove="tag">

	<!-- Bootstrap -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">

	<!-- Google Fonts -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

	<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">

	<!-- 自作CSS -->
	<link th:href="@{/css/style.css}" rel="stylesheet">

</div>

<title>fragment</title>

</head>

<body>

<!-- =========================
     header（mimpaku統一版）
========================== -->
<div th:fragment="header" th:remove="tag">

	<nav class="navbar navbar-expand-md navbar-light bg-white shadow-sm mimpaku-navbar">
		<div class="container mimpaku-container">

			<!-- ロゴ -->
			<a class="navbar-brand" th:href="@{/}">
				<img class="mimpaku-logo me-1" th:src="@{/images/logo.png}" alt="mimpaku">
			</a>

			<button class="navbar-toggler" type="button"
			        data-bs-toggle="collapse"
			        data-bs-target="#navbarSupportedContent">
				<span class="navbar-toggler-icon"></span>
			</button>

			<div class="collapse navbar-collapse" id="navbarSupportedContent">

				<ul class="navbar-nav ms-auto">

					<!-- 未ログイン -->
					<li class="nav-item" sec:authorize="isAnonymous()">
						<a class="nav-link" th:href="@{/login}">ログイン</a>
					</li>

					<li class="nav-item" sec:authorize="isAnonymous()">
						<a class="nav-link" th:href="@{/signup}">会員登録</a>
					</li>

					<!-- 一般ユーザー -->
					<li class="nav-item dropdown" sec:authorize="hasRole('ROLE_GENERAL')">

						<a class="nav-link dropdown-toggle"
						   href="#"
						   id="navbarDropdownGeneral"
						   role="button"
						   data-bs-toggle="dropdown">

							<span sec:authentication="principal.user.name"></span>

						</a>

						<div class="dropdown-menu dropdown-menu-end">

							<a class="dropdown-item mimpaku-dropdown-item"
							   th:href="@{/logout}"
							   onclick="event.preventDefault(); document.getElementById('logout-form-general').submit();">
								ログアウト
							</a>

							<form id="logout-form-general"
							      th:action="@{/logout}"
							      method="post"
							      class="d-none"></form>

						</div>
					</li>

					<!-- 管理者 -->
					<li class="nav-item dropdown" sec:authorize="hasRole('ROLE_ADMIN')">

						<a class="nav-link dropdown-toggle"
						   href="#"
						   id="navbarDropdownAdmin"
						   role="button"
						   data-bs-toggle="dropdown">
							管理者メニュー
						</a>

						<div class="dropdown-menu dropdown-menu-end">

							<a class="dropdown-item mimpaku-dropdown-item"
							   th:href="@{/admin/houses}">
								民宿一覧
							</a>

							<div class="dropdown-divider"></div>

							<a class="dropdown-item mimpaku-dropdown-item"
							   th:href="@{/logout}"
							   onclick="event.preventDefault(); document.getElementById('logout-form-admin').submit();">
								ログアウト
							</a>

							<form id="logout-form-admin"
							      th:action="@{/logout}"
							      method="post"
							      class="d-none"></form>

						</div>
					</li>

				</ul>

			</div>
		</div>
	</nav>

</div>

<!-- =========================
     footer（重要：これがエラー防止）
========================== -->
<div th:fragment="footer" th:remove="tag">

	<footer class="text-center py-4">
		<small>© mimpaku</small>
	</footer>

</div>

<!-- =========================
     scripts
========================== -->
<div th:fragment="scripts" th:remove="tag">

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

</div>

</body>
</html>
