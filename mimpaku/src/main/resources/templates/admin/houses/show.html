<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>

<!-- meta情報 -->
<div th:replace="~{fragment :: meta}"></div>

<!-- CSS・フォント -->
<div th:replace="~{fragment :: styles}"></div>

<title>民宿詳細</title>

</head>

<body>

	<!-- 全体ラッパー -->
	<div class="moattravel-wrapper">

		<!-- ヘッダー部品 -->
		<div th:replace="~{fragment :: header}"></div>

		<!-- =========================
             メインコンテンツ
        ========================== -->
		<!--======== 前略 ========-->

		<main>
			<div class="container pt-4 pb-5 moattravel-container">
				<div class="row justify-content-center">
					<div class="col-xl-5 col-lg-6 col-md-8">

						<nav class="mb-4" style="--bs-breadcrumb-divider: '>';"
							aria-label="breadcrumb">
							<ol class="breadcrumb mb-0">
								<li class="breadcrumb-item"><a th:href="@{/admin/houses}">民宿一覧</a>
								</li>
								<li class="breadcrumb-item active" aria-current="page">
									民宿詳細</li>
							</ol>
						</nav>

						<h1 class="mb-4 text-center" th:text="${house.getName()}"></h1>

						<div class="d-flex justify-content-end align-items-end mb-3">
							<div>
								<!-- 編集リンク -->
								<a th:href="@{/admin/houses/{id}/edit(id=${house.id})}"> 編集
								</a>
							</div>
						</div>


						<!-- =========================
                             民宿画像
                        ========================== -->
						<div class="mb-3">

							<!-- 画像あり -->
							<img th:if="${house.getImageName()}"
								th:src="@{/storage/{image}(image=${house.getImageName()})}"
								class="w-100" alt="民宿画像">

							<!-- 画像なし -->
							<img th:unless="${house.getImageName()}"
								th:src="@{/images/noImage.png}" class="w-100" alt="NO IMAGE">

						</div>

						<!-- =========================
                             民宿情報
                        ========================== -->
						<div class="container mb-4">

							<!-- ID -->
							<div class="row pb-2 mb-2 border-bottom">

								<div class="col-4">
									<span class="fw-bold">ID</span>
								</div>

								<div class="col">
									<span th:text="${house.getId()}"></span>
								</div>

							</div>

							<!-- 民宿名 -->
							<div class="row pb-2 mb-2 border-bottom">

								<div class="col-4">
									<span class="fw-bold">民宿名</span>
								</div>

								<div class="col">
									<span th:text="${house.getName()}"></span>
								</div>

							</div>

							<!-- 説明 -->
							<div class="row pb-2 mb-2 border-bottom">

								<div class="col-4">
									<span class="fw-bold">説明</span>
								</div>

								<div class="col">
									<span class="moattravel-pre-wrap"
										th:text="${house.getDescription()}"> </span>
								</div>

							</div>

							<!-- 宿泊料金 -->
							<div class="row pb-2 mb-2 border-bottom">

								<div class="col-4">
									<span class="fw-bold">宿泊料金</span>
								</div>

								<div class="col">
									<span
										th:text="${#numbers.formatInteger(house.getPrice(), 1, 'COMMA') + '円'}">
									</span>
								</div>

							</div>

							<!-- 定員 -->
							<div class="row pb-2 mb-2 border-bottom">

								<div class="col-4">
									<span class="fw-bold">定員</span>
								</div>

								<div class="col">
									<span th:text="${house.getCapacity() + '人'}"> </span>
								</div>

							</div>

							<!-- 郵便番号 -->
							<div class="row pb-2 mb-2 border-bottom">

								<div class="col-4">
									<span class="fw-bold">郵便番号</span>
								</div>

								<div class="col">
									<span th:text="${house.getPostalCode()}"> </span>
								</div>

							</div>

							<!-- 住所 -->
							<div class="row pb-2 mb-2 border-bottom">

								<div class="col-4">
									<span class="fw-bold">住所</span>
								</div>

								<div class="col">
									<span th:text="${house.getAddress()}"> </span>
								</div>

							</div>

							<!-- 電話番号 -->
							<div class="row pb-2 mb-2 border-bottom">

								<div class="col-4">
									<span class="fw-bold">電話番号</span>
								</div>

								<div class="col">
									<span th:text="${house.getPhoneNumber()}"> </span>
								</div>

							</div>

						</div>

					</div>

				</div>

			</div>

		</main>

		<!-- フッター部品 -->
		<div th:replace="~{fragment :: footer}"></div>

	</div>

	<!-- JavaScript部品 -->
	<div th:replace="~{fragment :: scripts}"></div>

</body>

</html>
