<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
<!-- Meta -->
<th:block th:replace="~{fragment :: meta}"></th:block>

<!-- Styles -->
<th:block th:replace="~{fragment :: styles}"></th:block>

<title>Tonight | 会員登録</title>
</head>

<body>

	<div class="tonight-wrapper">

		<!-- Header -->
		<th:block th:replace="~{fragment :: header}"></th:block>

		<main>
			<div class="container py-5 tonight-container">

				<div class="row justify-content-center">
					<div class="col-xl-6 col-lg-7 col-md-9">

						<div class="card shadow-sm border-0 rounded-4">
							<div class="card-body p-4 p-md-5">

								<h1 class="text-center mb-4 fw-bold">会員登録</h1>

								<form method="post" th:action="@{/signup}"
									th:object="${signupForm}">

									<!-- 名前 -->
									<div class="mb-3">
										<label for="name" class="form-label fw-bold"> 氏名 <span
											class="badge bg-danger ms-1">必須</span>
										</label>

										<div th:if="${#fields.hasErrors('name')}" th:errors="*{name}"
											class="text-danger small mb-2"></div>

										<input type="text" id="name" class="form-control"
											th:field="*{name}" autocomplete="name"
											placeholder="Tonight 太郎" autofocus>
									</div>

									<!-- フリガナ -->
									<div class="mb-3">
										<label for="furigana" class="form-label fw-bold"> フリガナ
											<span class="badge bg-danger ms-1">必須</span>
										</label>

										<div th:if="${#fields.hasErrors('furigana')}"
											th:errors="*{furigana}" class="text-danger small mb-2">
										</div>

										<input type="text" id="furigana" class="form-control"
											th:field="*{furigana}" placeholder="トゥナイト タロウ">
									</div>

									<!-- 郵便番号 -->
									<div class="mb-3">
										<label for="postalCode" class="form-label fw-bold">
											郵便番号 <span class="badge bg-danger ms-1">必須</span>
										</label>

										<div th:if="${#fields.hasErrors('postalCode')}"
											th:errors="*{postalCode}" class="text-danger small mb-2">
										</div>

										<input type="text" id="postalCode" class="form-control"
											th:field="*{postalCode}" autocomplete="postal-code"
											placeholder="101-0022">
									</div>

									<!-- 住所 -->
									<div class="mb-3">
										<label for="address" class="form-label fw-bold"> 住所 <span
											class="badge bg-danger ms-1">必須</span>
										</label>

										<div th:if="${#fields.hasErrors('address')}"
											th:errors="*{address}" class="text-danger small mb-2">
										</div>

										<input type="text" id="address" class="form-control"
											th:field="*{address}" placeholder="東京都千代田区〇〇1-2-3">
									</div>

									<!-- 電話番号 -->
									<div class="mb-3">
										<label for="phoneNumber" class="form-label fw-bold">
											電話番号 <span class="badge bg-danger ms-1">必須</span>
										</label>

										<div th:if="${#fields.hasErrors('phoneNumber')}"
											th:errors="*{phoneNumber}" class="text-danger small mb-2">
										</div>

										<input type="text" id="phoneNumber" class="form-control"
											th:field="*{phoneNumber}" autocomplete="tel"
											placeholder="090-1234-5678">
									</div>

									<!-- メール -->
									<div class="mb-3">
										<label for="email" class="form-label fw-bold"> メールアドレス
											<span class="badge bg-danger ms-1">必須</span>
										</label>

										<div th:if="${#fields.hasErrors('email')}"
											th:errors="*{email}" class="text-danger small mb-2"></div>

										<input type="email" id="email" class="form-control"
											th:field="*{email}" autocomplete="email"
											placeholder="tonight@example.com">
									</div>

									<!-- パスワード -->
									<div class="mb-3">
										<label for="password" class="form-label fw-bold">
											パスワード <span class="badge bg-danger ms-1">必須</span>
										</label>

										<div th:if="${#fields.hasErrors('password')}"
											th:errors="*{password}" class="text-danger small mb-2">
										</div>

										<input type="password" id="password" class="form-control"
											th:field="*{password}" autocomplete="new-password">
									</div>

									<!-- パスワード確認 -->
									<div class="mb-4">
										<label for="passwordConfirmation" class="form-label fw-bold">
											パスワード（確認用） <span class="badge bg-danger ms-1">必須</span>
										</label>

										<div th:if="${#fields.hasErrors('passwordConfirmation')}"
											th:errors="*{passwordConfirmation}"
											class="text-danger small mb-2"></div>

										<input type="password" id="passwordConfirmation"
											class="form-control" th:field="*{passwordConfirmation}"
											autocomplete="new-password">
									</div>

									<!-- ボタン -->
									<div class="d-grid mb-3">
										<button type="submit" class="btn btn-dark py-2 rounded-3">
											登録する</button>
									</div>

								</form>

								<div class="text-center">
									<a th:href="@{/login}" class="text-decoration-none">
										ログインはこちら </a>
								</div>

							</div>
						</div>

					</div>
				</div>

			</div>
		</main>

		<!-- Footer -->
		<th:block th:replace="~{fragment :: footer}"></th:block>

	</div>

	<!-- Scripts -->
	<th:block th:replace="~{fragment :: scripts}"></th:block>

</body>
</html>
