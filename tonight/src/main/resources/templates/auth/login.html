<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
<div th:replace="~{fragment :: meta}"></div>
<div th:replace="~{fragment :: styles}"></div>

<title>ログイン | tonight</title>
</head>

<body>
	<div class="tonight-wrapper">

		<!-- ヘッダー -->
		<div th:replace="~{fragment :: header}"></div>

		<main>
			<div class="container pt-5 pb-5 tonight-container">
				<div class="row justify-content-center">

					<div class="col-xl-4 col-lg-5 col-md-6 col-sm-8">

						<div class="card shadow-sm border-0 rounded-4 p-4">

							<h1 class="text-center mb-4">ログイン</h1>

							<p class="text-center text-muted mb-4">tonightへようこそ</p>

							<!-- エラーメッセージ -->
							<div th:if="${param.error}" class="alert alert-danger">
								メールアドレスまたはパスワードが正しくありません。</div>

							<!-- ログインフォーム -->
							<form th:action="@{/login}" method="post">

								<div class="form-group mb-3">
									<input type="text" class="form-control" name="username"
										autocomplete="email" placeholder="メールアドレス" autofocus>
								</div>

								<div class="form-group mb-3">
									<input type="password" class="form-control" name="password"
										autocomplete="current-password" placeholder="パスワード">
								</div>

								<div class="d-grid mt-4">
									<button type="submit"
										class="btn btn-dark shadow-sm tonight-btn">ログイン</button>
								</div>

							</form>

							<!-- 会員登録 -->
							<div class="text-center mt-4">
								<a th:href="@{/signup}"> 会員登録はこちら </a>
							</div>

						</div>

					</div>

				</div>
			</div>
		</main>

		<!-- フッター -->
		<div th:replace="~{fragment :: footer}"></div>

	</div>

	<div th:replace="~{fragment :: scripts}"></div>

</body>
</html>
