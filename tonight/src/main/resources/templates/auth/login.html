<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">


<head>
<div th:replace="~{fragment :: meta}"></div>
<div th:replace="~{fragment :: styles}"></div>

<title>ログイン | tonight</title>
</head>

<body>
	<div class="tonight-wrapper">

		<!-- ヘッダー -->
		<div th:replace="~{fragment :: header}"></div>

		<!-- ========================================
         Main
========================================= -->
		<main>

			<div class="container py-5 tonight-container">

				<div class="row justify-content-center">

					<div class="col-xl-4 col-lg-5 col-md-7 col-sm-9">

						<div class="card border-0 shadow-sm rounded-4">

							<div class="card-body p-4 p-md-5">

								<!-- Title -->
								<h1 class="text-center fw-bold mb-4">ログイン</h1>

								<!-- Error Message -->
								<div th:if="${param.error}"
									class="alert alert-danger text-center small">

									メールアドレスまたはパスワードが正しくありません。</div>

								<!-- Login Form -->
								<form th:action="@{/login}" method="post">

									<!-- Email -->
									<div class="mb-3">

										<label for="username" class="form-label fw-bold">

											メールアドレス </label> <input type="email" id="username" name="username"
											class="form-control" autocomplete="email"
											placeholder="tonight@example.com" autofocus required>
									</div>

									<!-- Password -->
									<div class="mb-4">

										<label for="password" class="form-label fw-bold">

											パスワード </label> <input type="password" id="password" name="password"
											class="form-control" autocomplete="current-password"
											placeholder="パスワード" required>
									</div>

									<!-- Submit -->
									<div class="d-grid mb-3">

										<button type="submit" class="btn btn-dark py-2 rounded-3">

											ログイン</button>
									</div>

								</form>

								<!-- Signup -->
								<div class="text-center">

									<a th:href="@{/signup}" class="text-decoration-none">

										会員登録はこちら </a>

								</div>

							</div>

						</div>

					</div>

				</div>

			</div>

		</main>

		<!-- フッター -->
		<div th:replace="~{fragment :: footer}"></div>

	</div>

	<div th:replace="~{fragment :: scripts}"></div>

</body>
</html>
