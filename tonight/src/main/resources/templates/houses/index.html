<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>

<!-- Meta -->
<div th:replace="~{fragment :: meta}"></div>

<!-- Styles -->
<div th:replace="~{fragment :: styles}"></div>

<title>民宿一覧</title>

</head>

<body>

	<div class="tonight-wrapper">

		<!-- ヘッダー -->
		<div th:replace="~{fragment :: header}"></div>

		<main>
			<div class="container tonight-container py-4">

				<!-- パンくず -->
				<nav class="mb-4" style="--bs-breadcrumb-divider: '>';"
					aria-label="breadcrumb">

					<ol class="breadcrumb mb-0">

						<li class="breadcrumb-item"><a th:href="@{/}">ホーム</a></li>

						<li class="breadcrumb-item active" aria-current="page">民宿一覧</li>

					</ol>

				</nav>

				<div class="row">

					<!-- =========================
		     左サイドバー
		========================= -->
					<div class="col-lg-3 mb-4">

						<!-- キーワード検索 -->
						<form method="get" th:action="@{/houses}" class="mb-4">

							<input type="hidden" name="area" th:value="${area}"> <input
								type="hidden" name="price" th:value="${price}"> <input
								type="hidden" name="sort" th:value="${sort}">

							<div class="input-group">

								<input type="text" class="form-control" name="keyword"
									th:value="${keyword}" placeholder="民宿名・目的地">

								<button type="submit" class="btn tonight-btn">検索</button>

							</div>

						</form>

						<!-- エリア検索 -->
						<div class="card mb-4">

							<div class="card-header">エリアから探す</div>

							<div class="card-body">

								<form method="get" th:action="@{/houses}">

									<input type="hidden" name="keyword" th:value="${keyword}">
									<input type="hidden" name="price" th:value="${price}">
									<input type="hidden" name="sort" th:value="${sort}"> <select
										class="form-select mb-3" name="area">

										<option value="">選択してください</option>

										<option value="北海道">北海道</option>
										<option value="青森県">青森県</option>
										<option value="岩手県">岩手県</option>
										<option value="宮城県">宮城県</option>
										<option value="秋田県">秋田県</option>
										<option value="山形県">山形県</option>
										<option value="福島県">福島県</option>

										<option value="茨城県">茨城県</option>
										<option value="栃木県">栃木県</option>
										<option value="群馬県">群馬県</option>
										<option value="埼玉県">埼玉県</option>
										<option value="千葉県">千葉県</option>
										<option value="東京都">東京都</option>
										<option value="神奈川県">神奈川県</option>

										<option value="新潟県">新潟県</option>
										<option value="富山県">富山県</option>
										<option value="石川県">石川県</option>
										<option value="福井県">福井県</option>
										<option value="山梨県">山梨県</option>
										<option value="長野県">長野県</option>
										<option value="岐阜県">岐阜県</option>
										<option value="静岡県">静岡県</option>
										<option value="愛知県">愛知県</option>

										<option value="三重県">三重県</option>
										<option value="滋賀県">滋賀県</option>
										<option value="京都府">京都府</option>
										<option value="大阪府">大阪府</option>
										<option value="兵庫県">兵庫県</option>
										<option value="奈良県">奈良県</option>
										<option value="和歌山県">和歌山県</option>

										<option value="鳥取県">鳥取県</option>
										<option value="島根県">島根県</option>
										<option value="岡山県">岡山県</option>
										<option value="広島県">広島県</option>
										<option value="山口県">山口県</option>

										<option value="徳島県">徳島県</option>
										<option value="香川県">香川県</option>
										<option value="愛媛県">愛媛県</option>
										<option value="高知県">高知県</option>

										<option value="福岡県">福岡県</option>
										<option value="佐賀県">佐賀県</option>
										<option value="長崎県">長崎県</option>
										<option value="熊本県">熊本県</option>
										<option value="大分県">大分県</option>
										<option value="宮崎県">宮崎県</option>
										<option value="鹿児島県">鹿児島県</option>
										<option value="沖縄県">沖縄県</option>

									</select>

									<button type="submit" class="btn tonight-btn w-100">
										検索</button>

								</form>

							</div>

						</div>

						<!-- 価格検索 -->
						<div class="card">

							<div class="card-header">1泊あたりの予算から探す</div>

							<div class="card-body">

								<form method="get" th:action="@{/houses}">

									<input type="hidden" name="keyword" th:value="${keyword}">
									<input type="hidden" name="area" th:value="${area}"> <input
										type="hidden" name="sort" th:value="${sort}"> <select
										class="form-select mb-3" name="price">

										<option value="">選択してください</option>

										<option value="3000">3,000円以下</option>
										<option value="5000">5,000円以下</option>
										<option value="10000">10,000円以下</option>
										<option value="20000">20,000円以下</option>
										<option value="30000">30,000円以下</option>

									</select>

									<button type="submit" class="btn tonight-btn w-100">
										検索</button>

								</form>

							</div>

						</div>

					</div>

					<!-- =========================
		     右側一覧
		========================= -->
					<div class="col-lg-9">

						<!-- 上部 -->
						<div
							class="d-flex justify-content-between align-items-center mb-4">

							<p class="mb-0 fw-bold">検索結果：57件</p>

							<!-- 並び替え -->
							<form method="get" th:action="@{/houses}" style="width: 180px;">

								<input type="hidden" name="keyword" th:value="${keyword}">
								<input type="hidden" name="area" th:value="${area}"> <input
									type="hidden" name="price" th:value="${price}"> <select
									name="sort" class="form-select" onchange="this.form.submit()">

									<option value="">新着順</option>

									<option value="priceAsc">価格が安い順</option>

								</select>

							</form>

						</div>

						<!-- カード -->
						<div th:each="house : ${housePage.content}"
							class="card mb-4 shadow-sm">

							<div class="row g-0">

								<!-- 画像 -->
								<div class="col-md-4">

									<img th:src="@{/storage/{img}(img=${house.imageName})}"
										class="house-list-image" alt="民宿画像">

								</div>

								<!-- 本文 -->
								<div class="col-md-8">

									<div class="card-body h-100 d-flex flex-column">

										<h3 class="card-title" th:text="${house.name}">民宿名</h3>

										<p class="text-muted mb-2" th:text="${house.address}">住所</p>

										<p class="card-text flex-grow-1"
											th:text="${house.description}">説明</p>

										<div class="mt-3">

											<strong class="fs-5"> ¥ <span
												th:text="${#numbers.formatInteger(house.price,1,'COMMA')}"></span>
												/ 泊
											</strong>

										</div>

									</div>

								</div>

							</div>

						</div>

					</div>

				</div>

			</div>
		</main>

		<!-- フッター -->
		<div th:replace="~{fragment :: footer}"></div>

	</div>

	<!-- Scripts -->
	<div th:replace="~{fragment :: scripts}"></div>

</body>

</html>
