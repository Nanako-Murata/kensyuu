<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>

<!-- ========================================
         Meta
    ========================================= -->
<th:block th:fragment="meta">

	<meta charset="UTF-8">

	<meta name="viewport" content="width=device-width, initial-scale=1">

</th:block>


<!-- ========================================
         Styles
    ========================================= -->
<th:block th:fragment="styles">

	<!-- Bootstrap -->
	<link
		href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
		rel="stylesheet"
		integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
		crossorigin="anonymous">

	<!-- Google Fonts -->
	<link rel="preconnect" href="https://fonts.googleapis.com">

	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

	<link
		href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap"
		rel="stylesheet">

	<!-- Original CSS -->
	<link th:href="@{/css/style.css}" rel="stylesheet">

</th:block>

<title>Tonight</title>

</head>

<body>

	<!-- Header Fragment -->
	<!-- ヘッダーの部品化 -->
	<div th:fragment="header" th:remove="tag">

		<nav
			class="navbar navbar-expand-md navbar-light bg-white shadow-sm tonight-navbar">

			<div class="container tonight-container">

				<!-- ロゴ -->
				<a class="navbar-brand" th:href="@{/}"> <img
					class="tonight-logo me-1" th:src="@{/images/logo.png}"
					alt="tonight">
				</a>

				<!-- ハンバーガーメニュー -->
				<button class="navbar-toggler" type="button"
					data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
					aria-controls="navbarSupportedContent" aria-expanded="false"
					aria-label="Toggle navigation">

					<span class="navbar-toggler-icon"></span>
				</button>

				<!-- ナビゲーション -->
				<div class="collapse navbar-collapse" id="navbarSupportedContent">

					<ul class="navbar-nav ms-auto">

						<!-- 未ログイン -->
						<li class="nav-item" sec:authorize="isAnonymous()"><a
							class="nav-link" th:href="@{/login}"> ログイン </a></li>

						<li class="nav-item" sec:authorize="isAnonymous()"><a
							class="nav-link" th:href="@{/signup}"> 会員登録 </a></li>

						<!-- 一般ユーザー -->
						<li class="nav-item dropdown"
							sec:authorize="hasRole('ROLE_GENERAL')"><a
							id="navbarDropdownGeneral" class="nav-link dropdown-toggle"
							href="#" role="button" data-bs-toggle="dropdown"
							aria-haspopup="true" aria-expanded="false" v-pre> <span
								sec:authentication="principal.user.name"></span>
						</a>

							<div class="dropdown-menu dropdown-menu-end"
								aria-labelledby="navbarDropdownGeneral">

								<a class="dropdown-item tonight-dropdown-item"
									th:href="@{/user}"> 会員情報 </a>

								<div class="dropdown-divider"></div>

								<a class="dropdown-item tonight-dropdown-item"
									th:href="@{/logout}"
									onclick="event.preventDefault();
                               document.getElementById('logout-form').submit();">

									ログアウト </a>

								<form class="d-none" id="logout-form" th:action="@{/logout}"
									method="post"></form>

							</div></li>

						<!-- 管理者 -->
						<li class="nav-item dropdown"
							sec:authorize="hasRole('ROLE_ADMIN')"><a
							id="navbarDropdownAdmin" class="nav-link dropdown-toggle"
							href="#" role="button" data-bs-toggle="dropdown"
							aria-haspopup="true" aria-expanded="false" v-pre> 管理者メニュー </a>

							<div class="dropdown-menu dropdown-menu-end"
								aria-labelledby="navbarDropdownAdmin">

								<a class="dropdown-item moattravel-dropdown-item"
									th:href="@{/admin/users}"> 会員一覧 </a> <a
									class="dropdown-item tonight-dropdown-item"
									th:href="@{/admin/houses}"> 民宿一覧 </a>

								<div class="dropdown-divider"></div>

								<a class="dropdown-item tonight-dropdown-item"
									th:href="@{/logout}"
									onclick="event.preventDefault();
                               document.getElementById('logout-form').submit();">

									ログアウト </a>

								<form class="d-none" id="logout-form" th:action="@{/logout}"
									method="post"></form>

							</div></li>

					</ul>

				</div>
			</div>
		</nav>

	</div>
	<!-- ========================================
         Footer
    ========================================= -->
	<th:block th:fragment="footer">

		<footer>

			<div class="d-flex justify-content-center align-items-center h-100">

				<p class="text-center text-muted small mb-0">&copy; Tonight All
					rights reserved.</p>

			</div>

		</footer>

	</th:block>


	<!-- ========================================
         Scripts
    ========================================= -->
	<th:block th:fragment="scripts">

		<!-- Bootstrap -->
		<script
			src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
			integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
			crossorigin="anonymous">
			
		</script>

	</th:block>

</body>

</html>
