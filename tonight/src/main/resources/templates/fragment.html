<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>

<!-- ========================================
         Meta
    ========================================= -->
<th:block th:fragment="meta">

	<meta charset="UTF-8">

	<meta name="viewport" content="width=device-width, initial-scale=1">

</th:block>


<!-- ========================================
         Styles
    ========================================= -->
<th:block th:fragment="styles">

	<!-- Bootstrap -->
	<link
		href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
		rel="stylesheet"
		integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
		crossorigin="anonymous">

	<!-- Google Fonts -->
	<link rel="preconnect" href="https://fonts.googleapis.com">

	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

	<link
		href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap"
		rel="stylesheet">

	<!-- Original CSS -->
	<link th:href="@{/css/style.css}" rel="stylesheet">

</th:block>

<title>Tonight</title>

</head>

<body>

	<!-- Header Fragment -->
	<th:block th:fragment="header">

		<nav
			class="navbar navbar-expand-lg navbar-light bg-white shadow-sm tonight-navbar">

			<div class="container tonight-container">

				<!-- Logo -->
				<a class="navbar-brand d-flex align-items-center" th:href="@{/}">

					<img th:src="@{/images/logo.png}" alt="Tonight"
					class="tonight-logo">
				</a>

				<!-- Hamburger -->
				<button class="navbar-toggler" type="button"
					data-bs-toggle="collapse" data-bs-target="#navbarNav"
					aria-controls="navbarNav" aria-expanded="false"
					aria-label="Toggle navigation">

					<span class="navbar-toggler-icon"></span>
				</button>

				<!-- Navigation -->
				<div class="collapse navbar-collapse" id="navbarNav">

					<ul class="navbar-nav ms-auto align-items-lg-center">

						<!-- Guest -->
						<li class="nav-item" sec:authorize="isAnonymous()"><a
							class="nav-link" th:href="@{/login}"> ログイン </a></li>

						<li class="nav-item" sec:authorize="isAnonymous()"><a
							class="btn btn-dark ms-lg-2 px-3 rounded-3" th:href="@{/signup}">
								会員登録 </a></li>

						<!-- General User -->
						<li class="nav-item dropdown"
							sec:authorize="hasRole('ROLE_GENERAL')"><a
							id="navbarDropdownUser" class="nav-link dropdown-toggle" href="#"
							role="button" data-bs-toggle="dropdown" aria-expanded="false">

								<span sec:authentication="principal.user.name"></span>
						</a>

							<ul class="dropdown-menu dropdown-menu-end border-0 shadow-sm">

								<li><a class="dropdown-item" th:href="@{/mypage}">
										マイページ </a></li>

								<li><hr class="dropdown-divider"></li>

								<li><a class="dropdown-item" href="#"
									onclick="event.preventDefault();
                                   document.getElementById('logout-form').submit();">
										ログアウト </a></li>

							</ul></li>

						<!-- Admin -->
						<li class="nav-item dropdown"
							sec:authorize="hasRole('ROLE_ADMIN')"><a
							id="navbarDropdownAdmin" class="nav-link dropdown-toggle"
							href="#" role="button" data-bs-toggle="dropdown"
							aria-expanded="false"> 管理者メニュー </a>

							<ul class="dropdown-menu dropdown-menu-end border-0 shadow-sm">

								<li><a class="dropdown-item" th:href="@{/admin/houses}">
										民宿一覧 </a></li>

								<li><a class="dropdown-item" th:href="@{/admin/users}">
										会員一覧 </a></li>

								<li><hr class="dropdown-divider"></li>

								<li><a class="dropdown-item" href="#"
									onclick="event.preventDefault();
                                   document.getElementById('logout-form').submit();">
										ログアウト </a></li>

							</ul></li>

					</ul>

				</div>

			</div>

		</nav>

		<!-- Logout Form -->
		<form id="logout-form" th:action="@{/logout}" method="post"
			class="d-none"></form>

	</th:block>
	<!-- ========================================
         Footer
    ========================================= -->
	<th:block th:fragment="footer">

		<footer>

			<div class="d-flex justify-content-center align-items-center h-100">

				<p class="text-center text-muted small mb-0">&copy; Tonight All
					rights reserved.</p>

			</div>

		</footer>

	</th:block>


	<!-- ========================================
         Scripts
    ========================================= -->
	<th:block th:fragment="scripts">

		<!-- Bootstrap -->
		<script
			src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
			integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
			crossorigin="anonymous">
			
		</script>

	</th:block>

</body>

</html>
