<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
<!-- meta -->
<th:block th:replace="~{fragment :: meta}"></th:block>

<!-- CSS -->
<th:block th:replace="~{fragment :: styles}"></th:block>

<title>民宿一覧</title>
</head>

<body>

	<div class="tonight-wrapper">

		<!-- ヘッダー -->
		<header th:replace="~{fragment :: header}"></header>

		<main>

			<div class="container pt-4 pb-5 tonight-container">

				<div class="row justify-content-center">

					<div class="col-xxl-9 col-xl-10 col-lg-11">

						<!-- タイトル -->
						<div class="text-center mb-4">

							<h1 class="tonight-title">民宿一覧</h1>

						</div>

						<!-- 検索 + 登録 -->
						<div
							class="d-flex justify-content-between align-items-end flex-wrap gap-3 mb-4">

							<!-- 検索フォーム -->
							<form method="get" th:action="@{/admin/houses}"
								class="flex-grow-1">

								<div class="input-group">

									<input type="text" class="form-control" name="keyword"
										th:value="${keyword}" placeholder="民宿名で検索">

									<button type="submit" class="btn tonight-btn">検索</button>

								</div>

							</form>

							<!-- 登録ボタン -->
							<a href="#" class="btn tonight-btn shadow-sm"> 登録 </a>

						</div>

						<!-- テーブル -->
						<div class="table-responsive">

							<table class="table align-middle">

								<thead>

									<tr>

										<th>ID</th>
										<th>民宿名</th>
										<th>郵便番号</th>
										<th>住所</th>
										<th>電話番号</th>
										<th class="text-center">詳細</th>

									</tr>

								</thead>

								<tbody>

									<tr th:each="house : ${housePage}">

										<td th:text="${house.getId()}"></td>

										<td class="fw-bold" th:text="${house.getName()}"></td>

										<td th:text="${house.getPostalCode()}"></td>

										<td th:text="${house.getAddress()}"></td>

										<td th:text="${house.getPhoneNumber()}"></td>

										<td class="text-center"><a
											th:href="@{/admin/houses/{id}(id=${house.id})}"
											class="tonight-link"> 詳細 </a></td>

									</tr>

								</tbody>

							</table>

						</div>

						<!-- ページネーション -->
						<div th:if="${housePage.getTotalPages() > 1}"
							class="d-flex justify-content-center mt-4">

							<nav aria-label="民宿一覧ページ">

								<ul class="pagination">

									<!-- 前へ -->
									<li class="page-item"><span th:if="${housePage.isFirst()}"
										class="page-link disabled"> 前 </span> <a
										th:unless="${housePage.isFirst()}"
										th:href="@{/admin/houses(page=${housePage.getNumber()-1}, keyword=${keyword})}"
										class="page-link"> 前 </a></li>

									<!-- ページ番号 -->
									<li
										th:each="i : ${#numbers.sequence(0, housePage.getTotalPages()-1)}"
										class="page-item"><span
										th:if="${i == housePage.getNumber()}"
										class="page-link tonight-active" th:text="${i + 1}"> </span> <a
										th:unless="${i == housePage.getNumber()}"
										th:href="@{/admin/houses(page=${i}, keyword=${keyword})}"
										class="page-link" th:text="${i + 1}"> </a></li>

									<!-- 次へ -->
									<li class="page-item"><span th:if="${housePage.isLast()}"
										class="page-link disabled"> 次 </span> <a
										th:unless="${housePage.isLast()}"
										th:href="@{/admin/houses(page=${housePage.getNumber()+1}, keyword=${keyword})}"
										class="page-link"> 次 </a></li>

								</ul>

							</nav>

						</div>

					</div>

				</div>

			</div>

		</main>

		<!-- フッター -->
		<footer th:replace="~{fragment :: footer}"></footer>

	</div>

	<!-- scripts -->
	<th:block th:replace="~{fragment :: scripts}"></th:block>

</body>

</html>
