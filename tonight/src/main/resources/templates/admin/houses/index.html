<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
<!-- meta -->
<th:block th:replace="~{fragment :: meta}"></th:block>

<!-- CSS -->
<th:block th:replace="~{fragment :: styles}"></th:block>

<title>民宿一覧</title>
</head>

<body>

	<div class="tonight-wrapper">

		<!-- ヘッダー -->
		<header th:replace="~{fragment :: header}"></header>
		<!--======== 前略 ========-->

		<main>

			<div class="container pt-4 pb-5 tonight-container">

				<div class="row justify-content-center">

					<div class="col-xxl-9 col-xl-10 col-lg-11">

						<!-- タイトル -->
						<h1 class="mb-4 text-center">民宿一覧</h1>

						<!-- 検索・登録 -->
						<div
							class="d-flex justify-content-between align-items-end flex-wrap mb-4">

							<!-- 検索フォーム -->
							<form method="get" th:action="@{/admin/houses}" class="mb-3">

								<div class="input-group">

									<input type="text" class="form-control" name="keyword"
										th:value="${keyword}" placeholder="民宿名">

									<button type="submit"
										class="btn text-white shadow-sm tonight-btn">検索</button>

								</div>

							</form>

							<!-- 登録ボタン -->
							<a th:href="@{/admin/houses/register}"
								class="btn text-white shadow-sm mb-3 tonight-btn"> 登録 </a>

						</div>

						<!-- 成功メッセージ -->
						<div th:if="${successMessage}" class="alert alert-info">

							<span th:text="${successMessage}"></span>

						</div>

						<!-- 一覧テーブル -->
						<div class="table-responsive">
							<!--======== 前略 ========-->

							<table class="table">

								<thead>

									<tr>

										<th scope="col">ID</th>

										<th scope="col">民宿名</th>

										<th scope="col">郵便番号</th>

										<th scope="col">住所</th>

										<th scope="col">電話番号</th>

										<th scope="col"></th>

										<th scope="col"></th>

									</tr>

								</thead>

								<tbody>

									<tr th:each="house : ${housePage}">

										<td th:text="${house.getId()}"></td>

										<td th:text="${house.getName()}"></td>

										<td th:text="${house.getPostalCode()}"></td>

										<td th:text="${house.getAddress()}"></td>

										<td th:text="${house.getPhoneNumber()}"></td>

										<td><a th:href="@{/admin/houses/{id}(id=${house.id})}">
												詳細 </a></td>

										<td><a href="#" class="tonight-link-danger"
											data-bs-toggle="modal"
											th:data-bs-target="${'#deleteHouseModal' + house.getId()}">

												削除 </a></td>

										<!-- 削除用モーダル -->
										<div class="modal fade"
											th:id="${'deleteHouseModal' + house.getId()}" tabindex="-1"
											th:aria-labelledby="${'deleteHouseModalLabel' + house.getId()}">

											<div class="modal-dialog">

												<div class="modal-content">

													<div class="modal-header">

														<h5 class="modal-title"
															th:id="${'deleteHouseModalLabel' + house.getId()}"
															th:text="${house.getName() + 'を削除してもよろしいですか？'}"></h5>

														<button type="button" class="btn-close"
															data-bs-dismiss="modal" aria-label="閉じる"></button>

													</div>

													<div class="modal-footer">

														<form method="post"
															th:action="@{/admin/houses/{id}/delete(id=${house.id})}">

															<button type="submit"
																class="btn tonight-btn-danger text-white shadow-sm">

																削除</button>

														</form>

													</div>

												</div>

											</div>

										</div>

									</tr>

								</tbody>

							</table>

							<!--======== 後略 ========-->



						</div>
						<!-- ページネーション -->
						<nav th:if="${housePage.totalPages > 1}" class="mt-4">

							<ul class="pagination justify-content-center">

								<!-- 前へ -->
								<li class="page-item"
									th:classappend="${housePage.first} ? 'disabled'"><a
									class="page-link"
									th:href="@{/admin/houses(page=${housePage.number - 1}, keyword=${keyword})}">
										前へ </a></li>

								<!-- ページ番号 -->
								<li class="page-item"
									th:each="i : ${#numbers.sequence(0, housePage.totalPages - 1)}"
									th:classappend="${i == housePage.number} ? 'active'"><a
									class="page-link"
									th:href="@{/admin/houses(page=${i}, keyword=${keyword})}"
									th:text="${i + 1}"> </a></li>

								<!-- 次へ -->
								<li class="page-item"
									th:classappend="${housePage.last} ? 'disabled'"><a
									class="page-link"
									th:href="@{/admin/houses(page=${housePage.number + 1}, keyword=${keyword})}">
										次へ </a></li>

							</ul>

						</nav>

					</div>

				</div>

			</div>


		</main>

		<!--======== 後略 ========-->



		<!-- フッター -->
		<footer th:replace="~{fragment :: footer}"></footer>

	</div>

	<!-- scripts -->
	<th:block th:replace="~{fragment :: scripts}"></th:block>

</body>
</html>
