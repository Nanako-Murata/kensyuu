<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>

<!-- Meta -->
<div th:replace="~{fragment :: meta}"></div>

<!-- Styles -->
<div th:replace="~{fragment :: styles}"></div>

<title>会員一覧</title>

</head>

<body>

	<div class="moattravel-wrapper">

		<!-- ヘッダー -->
		<div th:replace="~{fragment :: header}"></div>

		<main>

			<div class="container pt-4 pb-5 moattravel-container">

				<div class="row justify-content-center">

					<div class="col-xxl-9 col-xl-10 col-lg-11">

						<!-- タイトル -->
						<h1 class="mb-4 text-center">会員一覧</h1>

						<!-- 検索フォーム -->
						<div class="d-flex justify-content-between align-items-end mb-3">

							<form method="get" th:action="@{/admin/users}" class="w-100">

								<div class="input-group">

									<input type="text" class="form-control" name="kw"
										th:value="${keyword}" placeholder="氏名・フリガナで検索">

									<button type="submit"
										class="btn text-white shadow-sm moattravel-btn">検索</button>

								</div>

							</form>

						</div>

						<!-- 成功メッセージ -->
						<div th:if="${successMessage}" class="alert alert-info">

							<span th:text="${successMessage}"></span>

						</div>

						<!-- 会員一覧テーブル -->
						<div class="table-responsive">

							<table class="table table-hover align-middle">

								<thead class="table-light">

									<tr>
										<th scope="col">ID</th>
										<th scope="col">氏名</th>
										<th scope="col">フリガナ</th>
										<th scope="col">メールアドレス</th>
										<th scope="col"></th>
									</tr>

								</thead>

								<tbody>

									<tr th:each="user : ${userPage}">

										<td th:text="${user.id}"></td>

										<td th:text="${user.name}"></td>

										<td th:text="${user.furigana}"></td>

										<td th:text="${user.email}"></td>

										<td><a th:href="@{/admin/users/{id}(id=${user.id})}"
											class="btn btn-sm btn-outline-primary"> 詳細 </a></td>

									</tr>

								</tbody>

							</table>

						</div>

						<!-- ページネーション -->
						<div th:if="${userPage.totalPages > 1}"
							class="d-flex justify-content-center mt-4">

							<nav aria-label="会員一覧ページ">

								<ul class="pagination">

									<!-- 前へ -->
									<li class="page-item"><span th:if="${userPage.first}"
										class="page-link disabled"> 前 </span> <a
										th:unless="${userPage.first}"
										th:href="@{/admin/users(page=${userPage.number - 1}, kw=${keyword})}"
										class="page-link moattravel-page-link"> 前 </a></li>

									<!-- ページ番号 -->
									<li
										th:each="i : ${#numbers.sequence(0, userPage.totalPages - 1)}"
										class="page-item"><span th:if="${i == userPage.number}"
										class="page-link active moattravel-active" th:text="${i + 1}">
									</span> <a th:unless="${i == userPage.number}"
										th:href="@{/admin/users(page=${i}, kw=${keyword})}"
										class="page-link moattravel-page-link" th:text="${i + 1}">
									</a></li>

									<!-- 次へ -->
									<li class="page-item"><span th:if="${userPage.last}"
										class="page-link disabled"> 次 </span> <a
										th:unless="${userPage.last}"
										th:href="@{/admin/users(page=${userPage.number + 1}, kw=${keyword})}"
										class="page-link moattravel-page-link"> 次 </a></li>

								</ul>

							</nav>

						</div>

					</div>

				</div>

			</div>

		</main>

		<!-- フッター -->
		<div th:replace="~{fragment :: footer}"></div>

	</div>

	<!-- Scripts -->
	<div th:replace="~{fragment :: scripts}"></div>

</body>
</html>
