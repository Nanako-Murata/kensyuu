<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
<th:block th:replace="~{fragment :: meta}"></th:block>
<th:block th:replace="~{fragment :: styles}"></th:block>

<title>иұҢеӨ§пҪ®пҪҝи« пҝҪиқЈпҪұйӮұпҪЁй«®пҝҪ</title>
</head>

<body>
	<div class="samuraitraveltravel-wrapper">

		<!-- з№қеҖҘгғЈз№қпҝҪз№қпҪј -->
		<div th:replace="~{fragment :: header}"></div>

		<main>
			<div class="container pt-4 pb-5 samuraitraveltravel-container">
				<div class="row justify-content-center">
					<div class="col-xl-5 col-lg-6 col-md-8">

						<!-- з№қд»ЈОҰзёәдёҠвҳ… -->
						<nav class="mb-4" style="--bs-breadcrumb-divider: '>';"
							aria-label="breadcrumb">
							<ol class="breadcrumb mb-0">
								<li class="breadcrumb-item"><a th:href="@{/admin/houses}">иұҢеӨ§пҪ®пҪҝиҚіпҝҪйҡ•пҪ§</a>
								</li>
								<li class="breadcrumb-item"><a
									th:href="@{/admin/houses/{id}(id=${houseEditForm.id})}">иұҢеӨ§пҪ®пҪҝйҡ§пҪійӮҸпҪ°</a>
								</li>
								<li class="breadcrumb-item active" aria-current="page">иұҢеӨ§пҪ®пҪҝи« пҝҪиқЈпҪұйӮұпҪЁй«®пҝҪ</li>
							</ol>
						</nav>

						<h1 class="mb-4 text-center">иұҢеӨ§пҪ®пҪҝи« пҝҪиқЈпҪұйӮұпҪЁй«®пҝҪ</h1>

						<form method="post"
							th:action="@{/admin/houses/{id}/update(id=${houseEditForm.id})}"
							th:object="${houseEditForm}" enctype="multipart/form-data">

							<input type="hidden" th:field="*{id}">

							<!-- иұҢеӨ§пҪ®пҪҝиң·пҝҪ -->
							<div class="row mb-3">
								<div class="col-md-4">
									<label class="col-form-label fw-bold">иұҢеӨ§пҪ®пҪҝиң·пҝҪ</label>
								</div>
								<div class="col-md-8">
									<div th:errors="*{name}" class="text-danger small mb-2"></div>
									<input type="text" class="form-control" th:field="*{name}">
								</div>
							</div>

							<!-- йҖ•пҪ»иң’пҝҪ -->
							<div class="row mb-3">
								<div class="col-md-4">
									<label class="col-form-label fw-bold">иұҢеӨ§пҪ®пҪҝйҖ•пҪ»иң’пҝҪ</label>
								</div>
								<div class="col-md-8">
									<div th:errors="*{imageFile}" class="text-danger small mb-2"></div>
									<input type="file" class="form-control" th:field="*{imageFile}">
								</div>
							</div>

							<!-- иӯҢпҪўиҹ„еҖЎеҲӨиң’пҝҪ -->
							<div class="mb-3" th:if="${imageName}">
								<img th:src="@{/storage/{img}(img=${imageName})}" class="w-100">
							</div>

							<!-- йҡұпҪ¬иӯҸпҝҪ -->
							<div class="row mb-3">
								<div class="col-md-4">
									<label class="col-form-label fw-bold">йҡұпҪ¬иӯҸпҝҪ</label>
								</div>
								<div class="col-md-8">
									<div th:errors="*{description}" class="text-danger small mb-2"></div>
									<textarea class="form-control" th:field="*{description}"
										rows="5"></textarea>
								</div>
							</div>

							<!-- иӯҒе’ҺпҝҪпҝҪ -->
							<div class="row mb-3">
								<div class="col-md-4">
									<label class="col-form-label fw-bold">иһіпҪҝиұ•й ‘дҫӯй©ҘжүҳпҪјдәҘпҝҪпҝҪпҝҪпҪјпҝҪ</label>
								</div>
								<div class="col-md-8">
									<div th:errors="*{price}" class="text-danger small mb-2"></div>
									<input type="number" class="form-control" th:field="*{price}">
								</div>
							</div>

							<!-- иһіеЈји—Ө -->
							<div class="row mb-3">
								<div class="col-md-4">
									<label class="col-form-label fw-bold">иһіеЈји—ӨпҝҪпҪјдә•пҪәпҪәпҝҪпҪјпҝҪ</label>
								</div>
								<div class="col-md-8">
									<div th:errors="*{capacity}" class="text-danger small mb-2"></div>
									<input type="number" class="form-control"
										th:field="*{capacity}">
								</div>
							</div>

							<!-- й©ӣпҪөиҗ“пҪҝйҖЎпҪӘиңҝпҪ· -->
							<div class="row mb-3">
								<div class="col-md-4">
									<label class="col-form-label fw-bold">й©ӣпҪөиҗ“пҪҝйҖЎпҪӘиңҝпҪ·</label>
								</div>
								<div class="col-md-8">
									<div th:errors="*{postalCode}" class="text-danger small mb-2"></div>
									<input type="text" class="form-control"
										th:field="*{postalCode}">
								</div>
							</div>

							<!-- иҸҙд№—ең’ -->
							<div class="row mb-3">
								<div class="col-md-4">
									<label class="col-form-label fw-bold">иҸҙд№—ең’</label>
								</div>
								<div class="col-md-8">
									<div th:errors="*{address}" class="text-danger small mb-2"></div>
									<input type="text" class="form-control" th:field="*{address}">
								</div>
							</div>

							<!-- й«®пҪ»йҡ§пҪұйҖЎпҪӘиңҝпҪ· -->
							<div class="row mb-3">
								<div class="col-md-4">
									<label class="col-form-label fw-bold">й«®пҪ»йҡ§пҪұйҖЎпҪӘиңҝпҪ·</label>
								</div>
								<div class="col-md-8">
									<div th:errors="*{phoneNumber}" class="text-danger small mb-2"></div>
									<input type="text" class="form-control"
										th:field="*{phoneNumber}">
								</div>
							</div>

							<!-- з№қжҮҠгҒЎз№қпҪі -->
							<div class="d-flex justify-content-center my-4">
								<button type="submit"
									class="btn text-white shadow-sm w-50 samuraitraveltravel-btn">
									иӯ–пҪҙиӯҒпҪ°</button>
							</div>

						</form>

					</div>
				</div>
			</div>
		</main>

		<!-- з№қиј”гғЈз№§пҪҝз№қпҪј -->
		<div th:replace="~{fragment :: footer}"></div>

	</div>

	<div th:replace="~{fragment :: scripts}"></div>
	<script th:src="@{/js/preview.js}"></script>

</body>
</html>
