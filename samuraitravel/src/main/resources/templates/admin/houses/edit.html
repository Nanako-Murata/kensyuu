<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
    <th:block th:replace="~{fragment :: meta}"></th:block>
    <th:block th:replace="~{fragment :: styles}"></th:block>

    <title>民宿情報編集</title>
</head>

<body>
<div class="samuraitraveltravel-wrapper">

    <!-- ヘッダー -->
    <div th:replace="~{fragment :: header}"></div>

    <main>
        <div class="container pt-4 pb-5 samuraitraveltravel-container">
            <div class="row justify-content-center">
                <div class="col-xl-5 col-lg-6 col-md-8">

                    <!-- パンくず -->
                    <nav class="mb-4" style="--bs-breadcrumb-divider: '>';" aria-label="breadcrumb">
                        <ol class="breadcrumb mb-0">
                            <li class="breadcrumb-item">
                                <a th:href="@{/admin/houses}">民宿一覧</a>
                            </li>
                            <li class="breadcrumb-item">
                                <a th:href="@{/admin/houses/{id}(id=${houseEditForm.id})}">民宿詳細</a>
                            </li>
                            <li class="breadcrumb-item active" aria-current="page">民宿情報編集</li>
                        </ol>
                    </nav>

                    <h1 class="mb-4 text-center">民宿情報編集</h1>

                    <form method="post"
                          th:action="@{/admin/houses/{id}/update(id=${houseEditForm.id})}"
                          th:object="${houseEditForm}"
                          enctype="multipart/form-data">

                        <input type="hidden" th:field="*{id}">

                        <!-- 民宿名 -->
                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="col-form-label fw-bold">民宿名</label>
                            </div>
                            <div class="col-md-8">
                                <div th:errors="*{name}" class="text-danger small mb-2"></div>
                                <input type="text" class="form-control" th:field="*{name}">
                            </div>
                        </div>

                        <!-- 画像 -->
                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="col-form-label fw-bold">民宿画像</label>
                            </div>
                            <div class="col-md-8">
                                <div th:errors="*{imageFile}" class="text-danger small mb-2"></div>
                                <input type="file" class="form-control" th:field="*{imageFile}">
                            </div>
                        </div>

                        <!-- 既存画像 -->
                        <div class="mb-3" th:if="${imageName}">
                            <img th:src="@{/storage/{img}(img=${imageName})}" class="w-100">
                        </div>

                        <!-- 説明 -->
                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="col-form-label fw-bold">説明</label>
                            </div>
                            <div class="col-md-8">
                                <div th:errors="*{description}" class="text-danger small mb-2"></div>
                                <textarea class="form-control" th:field="*{description}" rows="5"></textarea>
                            </div>
                        </div>

                        <!-- 料金 -->
                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="col-form-label fw-bold">宿泊料金（円）</label>
                            </div>
                            <div class="col-md-8">
                                <div th:errors="*{price}" class="text-danger small mb-2"></div>
                                <input type="number" class="form-control" th:field="*{price}">
                            </div>
                        </div>

                        <!-- 定員 -->
                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="col-form-label fw-bold">定員（人）</label>
                            </div>
                            <div class="col-md-8">
                                <div th:errors="*{capacity}" class="text-danger small mb-2"></div>
                                <input type="number" class="form-control" th:field="*{capacity}">
                            </div>
                        </div>

                        <!-- 郵便番号 -->
                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="col-form-label fw-bold">郵便番号</label>
                            </div>
                            <div class="col-md-8">
                                <div th:errors="*{postalCode}" class="text-danger small mb-2"></div>
                                <input type="text" class="form-control" th:field="*{postalCode}">
                            </div>
                        </div>

                        <!-- 住所 -->
                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="col-form-label fw-bold">住所</label>
                            </div>
                            <div class="col-md-8">
                                <div th:errors="*{address}" class="text-danger small mb-2"></div>
                                <input type="text" class="form-control" th:field="*{address}">
                            </div>
                        </div>

                        <!-- 電話番号 -->
                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="col-form-label fw-bold">電話番号</label>
                            </div>
                            <div class="col-md-8">
                                <div th:errors="*{phoneNumber}" class="text-danger small mb-2"></div>
                                <input type="text" class="form-control" th:field="*{phoneNumber}">
                            </div>
                        </div>

                        <!-- ボタン -->
                        <div class="d-flex justify-content-center my-4">
                            <button type="submit" class="btn text-white shadow-sm w-50 samuraitraveltravel-btn">
                                更新
                            </button>
                        </div>

                    </form>

                </div>
            </div>
        </div>
    </main>

    <!-- フッター -->
    <div th:replace="~{fragment :: footer}"></div>

</div>

<div th:replace="~{fragment :: scripts}"></div>
<script th:src="@{/js/preview.js}"></script>

</body>
</html>
