<!DOCTYPE html>
 <html xmlns:th="https://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
	crossorigin="anonymous">

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
	href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&display=swap"
	rel="stylesheet">

<link th:href="@{/css/style.css}" rel="stylesheet">

<title>民宿詳細</title>
</head>

<body>
	<div class="moattravel-wrapper">

		<!-- ヘッダー -->
		<nav
			class="navbar navbar-expand-md navbar-light bg-white shadow-sm moattravel-navbar">
			<div class="container moattravel-container">
				<a class="navbar-brand" th:href="@{/}"> <img
					class="moattravel-logo me-1" th:src="@{/images/logo.png}"
					alt="moat Travel">
				</a>
			</div>
		</nav>

		<main>
			<div class="container pt-4 pb-5 moattravel-container">
				<div class="row justify-content-center">
					<div class="col-xl-5 col-lg-6 col-md-8">

						<!-- パンくず -->
						<nav class="mb-4" style="--bs-breadcrumb-divider: '>';"
							aria-label="breadcrumb">
							<ol class="breadcrumb mb-0">
								<li class="breadcrumb-item"><a th:href="@{/admin/houses}">民宿一覧</a>
								</li>
								<li class="breadcrumb-item active" aria-current="page">民宿詳細</li>
							</ol>
						</nav>

						<!-- タイトル -->
						<h1 class="mb-4 text-center" th:text="${house.name}"></h1>

						<!-- 編集 -->
						<div class="d-flex justify-content-end mb-3">
							<a href="#">編集</a>
						</div>

						<!-- 画像 -->
						<div class="mb-3">
							<img th:if="${house.imageName}"
								th:src="@{/storage/__${house.imageName}__}" class="w-100"
								alt="民宿画像"> <img th:unless="${house.imageName}"
								th:src="@{/images/noImage.png}" class="w-100" alt="NO IMAGE">
						</div>

						<!-- 詳細情報 -->
						<div class="container mb-4">

							<div class="row pb-2 mb-2 border-bottom">
								<div class="col-4 fw-bold">ID</div>
								<div class="col" th:text="${house.id}"></div>
							</div>

							<div class="row pb-2 mb-2 border-bottom">
								<div class="col-4 fw-bold">民宿名</div>
								<div class="col" th:text="${house.name}"></div>
							</div>

							<div class="row pb-2 mb-2 border-bottom">
								<div class="col-4 fw-bold">説明</div>
								<div class="col">
									<span class="moattravel-pre-wrap"
										th:text="${house.description}"></span>
								</div>
							</div>

							<div class="row pb-2 mb-2 border-bottom">
								<div class="col-4 fw-bold">宿泊料金</div>
								<div class="col"
									th:text="${#numbers.formatInteger(house.price, 1, 'COMMA')} + '円'"></div>
							</div>

							<div class="row pb-2 mb-2 border-bottom">
								<div class="col-4 fw-bold">定員</div>
								<div class="col" th:text="${house.capacity} + '人'"></div>
							</div>

							<div class="row pb-2 mb-2 border-bottom">
								<div class="col-4 fw-bold">郵便番号</div>
								<div class="col" th:text="${house.postalCode}"></div>
							</div>

							<div class="row pb-2 mb-2 border-bottom">
								<div class="col-4 fw-bold">住所</div>
								<div class="col" th:text="${house.address}"></div>
							</div>

							<div class="row pb-2 mb-2 border-bottom">
								<div class="col-4 fw-bold">電話番号</div>
								<div class="col" th:text="${house.phoneNumber}"></div>
							</div>

						</div>

					</div>
				</div>
			</div>
		</main>

		<!-- フッター -->
		<footer>
			<div class="d-flex justify-content-center align-items-center h-100">
				<p class="text-center text-muted small mb-0">&copy; moat Travel
					All rights reserved.</p>
			</div>
		</footer>

	</div>

	<!-- Bootstrap -->
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
		crossorigin="anonymous"></script>

</body>
</html>
