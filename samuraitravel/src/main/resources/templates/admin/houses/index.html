<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link
	href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&display=swap"
	rel="stylesheet">

<link th:href="@{/css/style.css}" rel="stylesheet">

<title>民宿一覧</title>
</head>

<body>

	<div class="moattravel-wrapper">

		<!-- ヘッダー -->
		<nav
			class="navbar navbar-expand-md navbar-light bg-white shadow-sm moattravel-navbar">

			<div class="container moattravel-container">

				<a class="navbar-brand" th:href="@{/}"> <img
					class="moattravel-logo me-1" th:src="@{/images/logo.png}"
					alt="moat Travel">
				</a>

			</div>

		</nav>

		<main>

			<div class="container pt-4 pb-5 moattravel-container">

				<div class="row justify-content-center">

					<div class="col-xxl-9 col-xl-10 col-lg-11">

						<div class="moattravel-card">

							<h1 class="mb-4 text-center">民宿一覧</h1>

							<!-- 検索＋登録 -->
							<div
								class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">

								<form method="get" th:action="@{/admin/houses}"
									class="flex-grow-1" style="max-width: 500px;">

									<div class="input-group">

										<input type="text" class="form-control" name="keyword"
											th:value="${keyword}" placeholder="民宿名で検索">

										<button type="submit"
											class="btn text-white shadow-sm moattravel-btn">検索</button>

									</div>

								</form>

								<a href="#" class="btn text-white shadow-sm moattravel-btn px-4">
									登録 </a>

							</div>

							<!-- テーブル -->
							<div class="table-responsive">

								<table class="table table-hover align-middle">

									<thead>
										<tr>
											<th scope="col">ID</th>
											<th scope="col">民宿名</th>
											<th scope="col">郵便番号</th>
											<th scope="col">住所</th>
											<th scope="col">電話番号</th>
											<th scope="col"></th>
											<th scope="col"></th>
										</tr>
									</thead>

									<tbody>

										<tr th:each="house : ${housePage}">

											<td th:text="${house.getId()}"></td>

											<td th:text="${house.getName()}"></td>

											<td th:text="${house.getPostalCode()}"></td>

											<td th:text="${house.getAddress()}"></td>

											<td th:text="${house.getPhoneNumber()}"></td>

											<td><a
												th:href="@{/admin/houses/{id}(id=${house.getId()})}"
												class="btn btn-sm btn-outline-primary"> 詳細 </a></td>

											<td><a href="#" class="moattravel-link-danger"
												data-bs-toggle="modal"
												th:data-bs-target="${'#deleteHouseModal' + house.getId()}">

													削除 </a></td>

										</tr>

									</tbody>

								</table>

							</div>



							<!-- ページネーション -->
							<div th:if="${housePage.totalPages > 1}"
								class="d-flex justify-content-center mt-4">

								<nav aria-label="民宿一覧ページ">

									<ul class="pagination">

										<li class="page-item"><span th:if="${housePage.first}"
											class="page-link disabled"> 前 </span> <a
											th:unless="${housePage.first}"
											th:href="@{/admin/houses(page=${housePage.number - 1}, keyword=${keyword})}"
											class="page-link moattravel-page-link"> 前 </a></li>

										<li
											th:each="i : ${#numbers.sequence(0, housePage.totalPages - 1)}"
											class="page-item"><span th:if="${i == housePage.number}"
											class="page-link active moattravel-active" th:text="${i + 1}">
										</span> <a th:unless="${i == housePage.number}"
											th:href="@{/admin/houses(page=${i}, keyword=${keyword})}"
											class="page-link moattravel-page-link" th:text="${i + 1}">
										</a></li>

										<li class="page-item"><span th:if="${housePage.last}"
											class="page-link disabled"> 次 </span> <a
											th:unless="${housePage.last}"
											th:href="@{/admin/houses(page=${housePage.number + 1}, keyword=${keyword})}"
											class="page-link moattravel-page-link"> 次 </a></li>

									</ul>

								</nav>

							</div>

						</div>

					</div>

				</div>

			</div>

		</main>

		<!-- フッター -->
		<footer>

			<div class="d-flex justify-content-center align-items-center h-100">

				<p class="text-center text-muted small mb-0">&copy; moat Travel
					All rights reserved.</p>

			</div>

		</footer>

	</div>

	<!-- Bootstrap -->
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js">
		
	</script>

</body>

</html>
