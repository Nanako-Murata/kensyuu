<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">


<head>
<th:block th:replace="~{fragment :: meta}"></th:block>
<th:block th:replace="~{fragment :: styles}"></th:block>

<title>民泊新規登録</title>
</head>

<body>
	<div class="samuraitraveltravel-wrapper">


		<div th:replace="~{fragment :: header}"></div>

		<main>
			<div class="container pt-4 pb-5 samuraitraveltravel-container">
				<div class="row justify-content-center">
					<div class="col-xl-5 col-lg-6 col-md-8">

						<!-- 繝代Φ縺上★ -->
						<nav class="mb-4" style="--bs-breadcrumb-divider: '>';"
							aria-label="breadcrumb">
							<ol class="breadcrumb mb-0">
								<li class="breadcrumb-item"><a th:href="@{/admin/houses}">民泊一覧</a>
								</li>
								<li class="breadcrumb-item active" aria-current="page">民泊登録</li>
							</ol>
						</nav>

						<h1 class="mb-4 text-center">民泊登録</h1>

						<form method="post" th:action="@{/admin/houses/create}"
							th:object="${houseRegisterForm}" enctype="multipart/form-data">

							<!-- 豌大ｮｿ蜷� -->
							<div class="row mb-3">
								<div class="col-md-4">
									<label class="fw-bold">民泊名</label>
								</div>
								<div class="col-md-8">
									<div th:if="${#fields.hasErrors('name')}"
										class="text-danger small mb-2" th:errors="*{name}"></div>
									<input type="text" class="form-control" th:field="*{name}"
										autofocus>
								</div>
							</div>

							<!-- 逕ｻ蜒� -->
							<div class="row mb-3">
								<div class="col-md-4">
									<label class="fw-bold">画像</label>
								</div>
								<div class="col-md-8">
									<div th:if="${#fields.hasErrors('imageFile')}"
										class="text-danger small mb-2" th:errors="*{imageFile}"></div>
									<input type="file" class="form-control" th:field="*{imageFile}">
								</div>
							</div>

							<!-- 逕ｻ蜒上�励Ξ繝薙Η繝ｼ -->
							<div class="row mb-3" id="imagePreview"></div>

							<!-- 隱ｬ譏� -->
							<div class="row mb-3">
								<div class="col-md-4">
									<label class="fw-bold">説明</label>
								</div>
								<div class="col-md-8">
									<div th:if="${#fields.hasErrors('description')}"
										class="text-danger small mb-2" th:errors="*{description}"></div>
									<textarea class="form-control" th:field="*{description}"
										rows="5"></textarea>
								</div>
							</div>

							<!-- 譁咎�� -->
							<div class="row mb-3">
								<div class="col-md-4">
									<label class="fw-bold">宿泊料金(単位：円)</label>
								</div>
								<div class="col-md-8">
									<div th:if="${#fields.hasErrors('price')}"
										class="text-danger small mb-2" th:errors="*{price}"></div>
									<input type="number" class="form-control" th:field="*{price}">
								</div>
							</div>

							<!-- 螳壼藤 -->
							<div class="row mb-3">
								<div class="col-md-4">
									<label class="fw-bold">定員(単位：人)</label>
								</div>
								<div class="col-md-8">
									<div th:if="${#fields.hasErrors('capacity')}"
										class="text-danger small mb-2" th:errors="*{capacity}"></div>
									<input type="number" class="form-control"
										th:field="*{capacity}">
								</div>
							</div>

							<!-- 驛ｵ萓ｿ逡ｪ蜿ｷ -->
							<div class="row mb-3">
								<div class="col-md-4">
									<label class="fw-bold">郵便番号</label>
								</div>
								<div class="col-md-8">
									<div th:if="${#fields.hasErrors('postalCode')}"
										class="text-danger small mb-2" th:errors="*{postalCode}"></div>
									<input type="text" class="form-control"
										th:field="*{postalCode}">
								</div>
							</div>

							<!-- 菴乗園 -->
							<div class="row mb-3">
								<div class="col-md-4">
									<label class="fw-bold">住所</label>
								</div>
								<div class="col-md-8">
									<div th:if="${#fields.hasErrors('address')}"
										class="text-danger small mb-2" th:errors="*{address}"></div>
									<input type="text" class="form-control" th:field="*{address}">
								</div>
							</div>

							<!-- 髮ｻ隧ｱ逡ｪ蜿ｷ -->
							<div class="row mb-3">
								<div class="col-md-4">
									<label class="fw-bold">電話番号</label>
								</div>
								<div class="col-md-8">
									<div th:if="${#fields.hasErrors('phoneNumber')}"
										class="text-danger small mb-2" th:errors="*{phoneNumber}"></div>
									<input type="text" class="form-control"
										th:field="*{phoneNumber}">
								</div>
							</div>

							<!-- 逋ｻ骭ｲ繝懊ち繝ｳ -->
							<div class="d-flex justify-content-center my-4">
								<button type="submit" class="btn btn-primary w-50">登録</button>
							</div>

						</form>

					</div>
				</div>
			</div>
		</main>

		<!-- 繝輔ャ繧ｿ繝ｼ -->
		<div th:replace="~{fragment :: footer}"></div>
	</div>

	<div th:replace="~{fragment :: scripts}"></div>
	<script th:src="@{/js/preview.js}"></script>

</body>
</html>
