<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- ================= META ================= -->
<th:block th:fragment="meta">
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
</th:block>

<!-- ================= STYLES ================= -->
<th:block th:fragment="styles">
	<link
		href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
		rel="stylesheet">
</th:block>

<!-- ================= HEADER ================= -->
<div th:fragment="header" th:remove="tag">

	<nav
		class="navbar navbar-expand-md navbar-light bg-white shadow-sm samuraitravel-navbar">

		<div class="container samuraitravel-container">

			<!-- ロゴ -->
			<a class="navbar-brand" th:href="@{/}"> <img
				class="samuraitravel-logo me-1" th:src="@{/images/logo.png}"
				alt="samurai Travel">
			</a>

			<!-- ハンバーガー -->
			<button class="navbar-toggler" type="button"
				data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
				aria-controls="navbarSupportedContent" aria-expanded="false"
				aria-label="Toggle navigation">

				<span class="navbar-toggler-icon"></span>
			</button>

			<!-- メニュー -->
			<div class="collapse navbar-collapse" id="navbarSupportedContent">

				<ul class="navbar-nav ms-auto">

					<!-- 未ログイン -->
					<li class="nav-item" sec:authorize="isAnonymous()"><a
						class="nav-link" th:href="@{/login}"> ログイン </a></li>

					<li class="nav-item" sec:authorize="isAnonymous()"><a
						class="nav-link" th:href="@{/signup}"> 会員登録 </a></li>

					<!-- 一般ユーザー -->
					<li class="nav-item dropdown"
						sec:authorize="hasRole('ROLE_GENERAL')"><a
						id="navbarDropdownGeneral" class="nav-link dropdown-toggle"
						href="#" role="button" data-bs-toggle="dropdown"
						aria-haspopup="true" aria-expanded="false" v-pre> <span
							sec:authentication="principal.user.name"></span>
					</a>

						<div class="dropdown-menu dropdown-menu-end"
							aria-labelledby="navbarDropdownGeneral">

							<a class="dropdown-item samuraitravel-dropdown-item"
								th:href="@{/user}"> 会員情報 </a> <a
								class="dropdown-item samuraitravel-dropdown-item"
								th:href="@{/reservations}"> 予約一覧 </a>

							<div class="dropdown-divider"></div>

							<a class="dropdown-item samuraitravel-dropdown-item"
								th:href="@{/logout}"
								onclick="event.preventDefault(); document.getElementById('logout-form-general').submit();">

								ログアウト </a>

							<form class="d-none" id="logout-form-general"
								th:action="@{/logout}" method="post"></form>
						</div></li>

					<!-- 管理者 -->
					<li class="nav-item dropdown" sec:authorize="hasRole('ROLE_ADMIN')">

						<a id="navbarDropdownAdmin" class="nav-link dropdown-toggle"
						href="#" role="button" data-bs-toggle="dropdown"
						aria-haspopup="true" aria-expanded="false" v-pre> 管理者メニュー </a>

						<div class="dropdown-menu dropdown-menu-end"
							aria-labelledby="navbarDropdownAdmin">

							<a class="dropdown-item samuraitravel-dropdown-item"
								th:href="@{/admin/users}"> 会員一覧 </a> <a
								class="dropdown-item samuraitravel-dropdown-item"
								th:href="@{/admin/houses}"> 民宿一覧 </a>

							<div class="dropdown-divider"></div>

							<a class="dropdown-item samuraitravel-dropdown-item"
								th:href="@{/logout}"
								onclick="event.preventDefault(); document.getElementById('logout-form-admin').submit();">

								ログアウト </a>

							<form class="d-none" id="logout-form-admin"
								th:action="@{/logout}" method="post"></form>

						</div>
					</li>

				</ul>

			</div>

		</div>

	</nav>

</div>

<!-- ================= FOOTER ================= -->
<th:block th:fragment="footer">
	<footer class="text-center py-3">
		<p class="text-muted small mb-0">&copy; samuraiTravel All rights
			reserved.</p>
	</footer>
</th:block>

<!-- ================= SCRIPTS ================= -->
<th:block th:fragment="scripts">
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</th:block>

</html>
